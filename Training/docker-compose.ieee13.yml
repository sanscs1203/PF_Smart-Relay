services:

  preprocess-ieee13:
    build: .
    container_name: sr_preprocess_ieee13
    volumes:
      - ./data:/app/data
      - ./utils:/app/utils
      - ./ieee13:/app/ieee13
      - ./logs:/app/logs
    command: >
      bash -c "set -o pipefail &&
               mkdir -p /app/logs &&
               python3 -u utils/preprocess.py --config ieee13/config.yaml --subsample-fraction 0.21 --fault-multiplier 1.0 2>&1 | tee /app/logs/preprocess_ieee13.txt"
    restart: on-failure
    stop_grace_period: 24h

  split-ieee13:
    build: .
    container_name: sr_split_ieee13
    volumes:
      - ./data:/app/data
      - ./utils:/app/utils
      - ./ieee13:/app/ieee13
      - ./logs:/app/logs
    command: >
      bash -c "set -o pipefail &&
               mkdir -p /app/logs &&
               python3 -u utils/split.py --config ieee13/config.yaml 2>&1 | tee /app/logs/split_ieee13.txt"
    depends_on:
      preprocess-ieee13:
        condition: service_completed_successfully
    restart: on-failure
    stop_grace_period: 24h

  -------------------------
  Detection pipeline
  -------------------------

  train-det-ieee13:
    build: .
    container_name: sr_train_det_ieee13
    volumes:
      - ./data:/app/data
      - ./utils:/app/utils
      - ./ieee13:/app/ieee13
      - ./logs:/app/logs
    command: >
      bash -c "set -o pipefail &&
               mkdir -p /app/logs &&
               python3 -u ieee13/detection/train.py --config ieee13/config.yaml 2>&1 | tee /app/logs/train_det_ieee13.txt"
    depends_on:
      split-ieee13:
        condition: service_completed_successfully
    restart: on-failure
    stop_grace_period: 24h

  evaluate-det-ieee13:
    build: .
    container_name: sr_evaluate_det_ieee13
    volumes:
      - ./data:/app/data
      - ./utils:/app/utils
      - ./ieee13:/app/ieee13
      - ./logs:/app/logs
    command: >
      bash -c "set -o pipefail &&
               mkdir -p /app/logs &&
               python3 -u ieee13/detection/evaluate.py --config ieee13/config.yaml 2>&1 | tee /app/logs/evaluate_det_ieee13.txt"
    depends_on:
      train-det-ieee13:
        condition: service_completed_successfully
    restart: on-failure
    stop_grace_period: 24h

  mcdm-det-ieee13:
    build: .
    container_name: sr_mcdm_det_ieee13
    volumes:
      - ./data:/app/data
      - ./utils:/app/utils
      - ./ieee13:/app/ieee13
      - ./logs:/app/logs
    command: >
      bash -c "set -o pipefail &&
               mkdir -p /app/logs &&
               python3 -u ieee13/detection/mcdm.py --config ieee13/config.yaml 2>&1 | tee /app/logs/mcdm_det_ieee13.txt"
    depends_on:
      evaluate-det-ieee13:
        condition: service_completed_successfully
    restart: on-failure
    stop_grace_period: 24h

  predict-det-ieee13:
    build: .
    container_name: sr_predict_det_ieee13
    volumes:
      - ./data:/app/data
      - ./utils:/app/utils
      - ./ieee13:/app/ieee13
      - ./logs:/app/logs
    command: >
      bash -c "set -o pipefail &&
               mkdir -p /app/logs &&
               python3 -u ieee13/detection/predict.py --config ieee13/config.yaml --mode lab --input data/real/lab_data.csv --optimize-threshold --nested-cv 2>&1 | tee /app/logs/predict_det_ieee13.txt"
    depends_on:
      mcdm-det-ieee13:
        condition: service_completed_successfully
    restart: on-failure
    stop_grace_period: 24h

  -------------------------
  Classification pipeline
  -------------------------

  train-cls-ieee13:
    build: .
    container_name: sr_train_cls_ieee13
    volumes:
      - ./data:/app/data
      - ./utils:/app/utils
      - ./ieee13:/app/ieee13
      - ./logs:/app/logs
    command: >
      bash -c "set -o pipefail &&
               mkdir -p /app/logs &&
               python3 -u ieee13/classification/train.py --config ieee13/config.yaml --real-data data/real/lab_data.csv 2>&1 | tee /app/logs/train_cls_ieee13.txt"
    depends_on:
     predict-det-ieee13:
       condition: service_completed_successfully
    restart: on-failure
    stop_grace_period: 24h

  evaluate-cls-ieee13:
    build: .
    container_name: sr_evaluate_cls_ieee13
    volumes:
      - ./data:/app/data
      - ./utils:/app/utils
      - ./ieee13:/app/ieee13
      - ./logs:/app/logs
    command: >
      bash -c "set -o pipefail &&
               mkdir -p /app/logs &&
               python3 -u ieee13/classification/evaluate.py --config ieee13/config.yaml 2>&1 | tee /app/logs/evaluate_cls_ieee13.txt"
    depends_on:
      train-cls-ieee13:
        condition: service_completed_successfully
    restart: on-failure
    stop_grace_period: 24h

  mcdm-cls-ieee13:
    build: .
    container_name: sr_mcdm_cls_ieee13
    volumes:
      - ./data:/app/data
      - ./utils:/app/utils
      - ./ieee13:/app/ieee13
      - ./logs:/app/logs
    command: >
      bash -c "set -o pipefail &&
               mkdir -p /app/logs &&
               python3 -u ieee13/classification/mcdm.py --config ieee13/config.yaml --mode sim --input data/splits/ieee13/cls_test.csv 2>&1 | tee /app/logs/mcdm_cls_ieee13.txt"
    depends_on:
     evaluate-cls-ieee13:
       condition: service_completed_successfully
    restart: on-failure
    stop_grace_period: 24h

  predict-cls-ieee13:
    build: .
    container_name: sr_predict_cls_ieee13
    volumes:
      - ./data:/app/data
      - ./utils:/app/utils
      - ./ieee13:/app/ieee13
      - ./logs:/app/logs
    command: >
      bash -c "set -o pipefail &&
               mkdir -p /app/logs &&
               python3 -u ieee13/classification/predict.py --config ieee13/config.yaml --mode lab --input data/real/lab_data.csv --cv-eval 2>&1 | tee /app/logs/predict_cls_ieee13.txt"
    depends_on:
      mcdm-cls-ieee13:
        condition: service_completed_successfully
    restart: on-failure
    stop_grace_period: 24h