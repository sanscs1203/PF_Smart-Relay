      sh -c "set -o pipefail &&
             mkdir -p /app/logs &&
             python -u utils/split.py --config ieee5/config.yaml 2>&1 | tee /app/logs/split_ieee5.txt"
    depends_on:
      preprocess-ieee5:
        condition: service_completed_successfully
    restart: on-failure
    stop_grace_period: 24h

  # =========================
  # Training IEEE 13
  # =========================

  train-det-ieee13:
    build: .
    container_name: sr_train_det_ieee13
    # For Jetson GPU acceleration uncomment the next line:
    # runtime: nvidia
    # environment:
    #   - NVIDIA_VISIBLE_DEVICES=all
    # To limit CPU cores uncomment:
    # cpus: '0-3'
    volumes:
      - ./data:/app/data
      - ./utils:/app/utils
      - ./ieee13:/app/ieee13
      - ./logs:/app/logs
    command: >
      sh -c "set -o pipefail &&
             mkdir -p /app/logs &&
             python -u ieee13/detection/train.py --config ieee13/config.yaml 2>&1 | tee /app/logs/train_det_ieee13.txt"
    depends_on:
      split-ieee5:
        condition: service_completed_successfully
    restart: on-failure
    stop_grace_period: 24h

  train-cls-ieee13:
    build: .
    container_name: sr_train_cls_ieee13
    # runtime: nvidia
    volumes:
      - ./data:/app/data
      - ./utils:/app/utils
      - ./ieee13:/app/ieee13
