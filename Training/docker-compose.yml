# =============================================================================
# docker-compose.yml — Smart Relay Project (Sequential Pipeline)
# =============================================================================
#
# This compose file runs the entire ML pipeline one step at a time, which is
# ideal for resource‑constrained devices like the NVIDIA Jetson.
#
# Execution order (sequential, no parallelism):
#   1.  preprocess-ieee13
#   2.  split-ieee13
#   3.  preprocess-ieee5
#   4.  split-ieee5
#   5.  train-det-ieee13
#   6.  train-cls-ieee13
#   7.  train-det-ieee5
#   8.  train-cls-ieee5
#   9.  evaluate-det-ieee13
#  10.  mcdm-det-ieee13
#  11.  predict-det-ieee13
#  12.  evaluate-cls-ieee13
#  13.  mcdm-cls-ieee13
#  14.  predict-cls-ieee13
#  15.  evaluate-det-ieee5
#  16.  mcdm-det-ieee5
#  17.  predict-det-ieee5
#  18.  evaluate-cls-ieee5
#  19.  mcdm-cls-ieee5
#  20.  predict-cls-ieee5
#
# Usage:
#   docker compose up --build      # first run (build image)
#   docker compose up              # subsequent runs
#   tail -f logs/train_det_ieee13.txt   # follow a specific log
#   docker compose down            # stop and remove containers
#
# Jetson optimisations:
#   - The pipeline is sequential → one container at a time → low RAM pressure.
#   - To enable GPU acceleration add `runtime: nvidia` to each train-* service
#     (see commented example in train-det-ieee13).
#   - To cap CPU cores uncomment the `cpus` line and adjust as needed.
#
# Requirements:
#   - data/raw/ieee13.csv must exist before running the ieee13 chain.
#   - data/raw/ieee5.csv  must exist before running the ieee5 chain.
# =============================================================================

services:

  # =========================
  # Preprocessing + Splitting
  # =========================

  preprocess-ieee13:
    build: .
    container_name: sr_preprocess_ieee13
    volumes:
      - ./data:/app/data
      - ./utils:/app/utils
      - ./ieee13:/app/ieee13
      - ./logs:/app/logs
    command: >
      sh -c "set -o pipefail &&
             mkdir -p /app/logs &&
             python -u utils/preprocess.py --config ieee13/config.yaml 2>&1 | tee /app/logs/preprocess_ieee13.txt"
    restart: on-failure
    stop_grace_period: 24h

  split-ieee13:
    build: .
    container_name: sr_split_ieee13
    volumes:
      - ./data:/app/data
      - ./utils:/app/utils
      - ./ieee13:/app/ieee13
      - ./logs:/app/logs
    command: >
      sh -c "set -o pipefail &&
             mkdir -p /app/logs &&
             python -u utils/split.py --config ieee13/config.yaml 2>&1 | tee /app/logs/split_ieee13.txt"
    depends_on:
      preprocess-ieee13:
        condition: service_completed_successfully
    restart: on-failure
    stop_grace_period: 24h

  preprocess-ieee5:
    build: .
    container_name: sr_preprocess_ieee5
    volumes:
      - ./data:/app/data
      - ./utils:/app/utils
      - ./ieee5:/app/ieee5
      - ./logs:/app/logs
    command: >
      sh -c "set -o pipefail &&
             mkdir -p /app/logs &&
             python -u utils/preprocess.py --config ieee5/config.yaml 2>&1 | tee /app/logs/preprocess_ieee5.txt"
    depends_on:
      split-ieee13:
        condition: service_completed_successfully
    restart: on-failure
    stop_grace_period: 24h

  split-ieee5:
    build: .
    container_name: sr_split_ieee5
    volumes:
      - ./data:/app/data
      - ./utils:/app/utils
      - ./ieee5:/app/ieee5
      - ./logs:/app/logs
