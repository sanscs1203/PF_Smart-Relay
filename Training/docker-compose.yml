      - ./logs:/app/logs
    command: >
      sh -c "set -o pipefail &&
             mkdir -p /app/logs &&
             python -u ieee13/detection/mcdm.py --config ieee13/config.yaml 2>&1 | tee /app/logs/mcdm_det_ieee13.txt"
    depends_on:
      evaluate-det-ieee13:
        condition: service_completed_successfully
    restart: on-failure
    stop_grace_period: 24h

  predict-det-ieee13:
    build: .
    container_name: sr_predict_det_ieee13
    volumes:
      - ./data:/app/data
      - ./utils:/app/utils
      - ./ieee13:/app/ieee13
      - ./logs:/app/logs
    command: >
      sh -c "set -o pipefail &&
             mkdir -p /app/logs &&
             python -u ieee13/detection/predict.py --config ieee13/config.yaml --mode sim --input data/splits/ieee13/det_test.csv 2>&1 | tee /app/logs/predict_det_ieee13.txt"
    depends_on:
