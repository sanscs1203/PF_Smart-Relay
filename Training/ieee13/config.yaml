# =============================================================================
# config.yaml — IEEE 13-Bus System (actualizado)
# =============================================================================
# Central configuration for detection module (classification se mantiene igual).
# Todos los paths relativos a la raíz del proyecto (smart_relay/).
# =============================================================================

network:
  name: IEEE 13-Bus
  id:   ieee13
  nodes: [611, 632, 633, 645, 646, 652, 671, 675, 680, 684, 692]

data:
  raw_csv: data/raw/ieee13.csv
  processed_dir: data/processed/ieee13
  splits_dir: data/splits/ieee13
  sep: ";"
  decimal: ","
  columns:
    label: Tipo_Falla
    no_fault: Sin_Falla
    features:
      - Va
      - Vb
      - Vc
      - Ia
      - Ib
      - Ic
  fault_types:
    - L A
    - L B
    - L C
    - LL AB
    - LL BC
    - LL CA
    - LLG AB
    - LLG BC
    - LLG CA
    - LLL ABC

split:
  train: 0.75          
  val:   0.15          
  test:  0.15          
  random_state: 42

detection:
  models_dir:  ieee13/detection/models/
  results_dir: ieee13/detection/results/
  images_dir:  ieee13/detection/images/

  ahp:
    pairwise_matrix:
      Recall_vs_Specificity: 3

  cv:
    n_splits:     5
    shuffle:      true
    random_state: 42

  threshold:
    min:   0.10
    max:   0.90
    steps: 41
    min_specificity: 0.90

  monte_carlo:
    n_simulations: 200
    subsample_rate: 0.90
    concentration: 10.0
    random_seed:   42

  mcdm:
    spec_margin: 0.05

  random_forest:
    model_id:     RF
    class_weight: balanced
    random_state: 242
    n_jobs: -1
    param_grid:
      n_estimators:      [50, 100]           
      max_depth:         [5, 10, 15]         
      min_samples_split: [5, 10]             
      min_samples_leaf:  [2, 4]              
      max_features:      [sqrt]

  svm:
    model_id:     SVM
    probability:  true
    class_weight: balanced
    n_jobs: -1
    random_state: 242
    param_grid:
      C:      [0.1, 1, 10]
      kernel: [rbf]
      gamma:  [scale]

  mlp:
    model_id:     MLP
    random_state: 242
    n_jobs: -1
    param_grid:
      hidden_layer_sizes: [[64, 32]]
      activation:         [relu]
      max_iter:           [500, 1000]
      alpha:              [0.001, 0.01]

classification:
  models_dir:  ieee13/classification/models/
  results_dir: ieee13/classification/results/
  images_dir:  ieee13/classification/images/
  cv:
    n_splits:     5
    shuffle:      true
    random_state: 42
  scorer:
    metric: weighted_recall
  monte_carlo:
    n_simulations: 100
    subsample_rate: 0.90
    random_state:   42
  random_forest:
    model_id:     RF
    class_weight: balanced
    random_state: 242
    n_jobs: -1
    param_grid:
      n_estimators:      [50, 100]
      max_depth:         [5, 10, 15]
      min_samples_split: [5, 10]
      min_samples_leaf:  [2, 4]
      max_features:      [sqrt]
  xgboost:
    model_id:     XGB
    random_state: 242
    n_jobs: -1
    param_grid:
      n_estimators:     [50, 100]
      max_depth:        [3, 6]
      learning_rate:    [0.1]
      subsample:        [0.8, 1.0]
      colsample_bytree: [0.8]
  knn:
    model_id: KNN
    n_jobs: -1
    param_grid:
      n_neighbors: [3, 5, 7, 11]
      weights:     [uniform]
      metric:      [euclidean]