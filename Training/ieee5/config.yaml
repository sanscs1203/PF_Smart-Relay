# =============================================================================
# config.yaml — IEEE 5-Bus System
#
# Central configuration for all modules (detection and classification).
# All paths are relative to the project root (smart_relay/).
# Edit this file to change any parameter without touching .py files.
#
# Usage in Python:
#   import yaml
#   with open("ieee5/config.yaml") as f:
#       cfg = yaml.safe_load(f)
# =============================================================================

# -----------------------------------------------------------------------------
# Network identity
# -----------------------------------------------------------------------------
network:
  name: IEEE 5-Bus
  id:   ieee5
  nodes: [Nodo_2, Nodo_3, Nodo_4, Nodo_5]

# -----------------------------------------------------------------------------
# Data
# -----------------------------------------------------------------------------
data:
  # Raw source — never modified
  raw_csv: data/raw/ieee5.csv                     

  # Processed — generated by utils/preprocess.py
  processed_dir: data/processed/ieee5            

  # Splits — generated by utils/split.py
  splits_dir: data/splits/ieee5                   

  # CSV format
  sep:     ";"
  decimal: ","

  # Column roles
  columns:
    label:    Tipo_Falla     # source column for building binary / multiclass labels
    no_fault: Sin_Falla      # value that means normal operation
    features:
    - Va
    - Vb
    - Vc
    - phi_Va
    - phi_Vb
    - phi_Vc
    - Ia
    - Ib
    - Ic
    - phi_Ia
    - phi_Ib
    - phi_Ic

  # Known fault-type labels — used by preprocess.py for validation
  fault_types:               
    - L A
    - L B
    - L C
    - LL AB
    - LL BC
    - LL CA
    - LLG AB
    - LLG BC
    - LLG CA
    - LLL ABC

# -----------------------------------------------------------------------------
# Split settings
# -----------------------------------------------------------------------------
split:                                            
  train:        0.70
  val:          0.15
  test:         0.15
  random_state: 42

# -----------------------------------------------------------------------------
# Detection module
# -----------------------------------------------------------------------------
detection:
  # Output directories
  models_dir:  ieee5/detection/models/
  results_dir: ieee5/detection/results/
  images_dir:  ieee5/detection/images/

  # AHP weights (Saaty, 1980) 
  ahp:
    pairwise_matrix:
      Recall_vs_Specificity:  3

  # Stratified k-fold cross-validation
  cv:
    n_splits:     5
    shuffle:      true
    random_state: 42

  # Threshold optimization — swept on val set, applied on test set
  threshold:
    min:   0.10
    max:   0.90
    steps: 81      # evaluates every 0.01 increment
    min_specificity:  0.90 

  # Monte Carlo robustness analysis
  monte_carlo:
    n_simulations: 1000
    concentration: 10.0
    random_seed:   42
  
  # Specifity margin for best model selection 
  mcdm:
    spec_margin: 0.05

  # ── Candidate models ──────────────────────────────────────────────

  random_forest:
    model_id:     RF
    class_weight: balanced
    random_state: 242
    n_jobs: -1
    param_grid:
      n_estimators:      [100, 200, 300, 500]
      max_depth:         [5, 10, 15, 20, null]   # null = no limit
      min_samples_split: [2, 5, 10]
      min_samples_leaf:  [1, 2, 4]
      max_features:      [sqrt, log2]

  svm:
    model_id:     SVM
    probability:  true           # required for predict_proba / ROC-AUC
    class_weight: balanced
    random_state: 242
    n_jobs: 2
    param_grid:
      C:      [0.1, 1, 10, 100]
      kernel: [rbf, poly]
      gamma:  [scale, auto]

  mlp:
    model_id:     MLP
    random_state: 242
    n_jobs: -1
    param_grid:
      hidden_layer_sizes: [[64, 32], [128, 64], [64, 32, 16]]
      activation:         [relu, tanh]
      max_iter:           [500, 1000]
      alpha:              [0.0001, 0.001]    # L2 regularization

# -----------------------------------------------------------------------------
# Classification module
# -----------------------------------------------------------------------------
classification:
  # Output directories
  models_dir:  ieee5/classification/models/
  results_dir: ieee5/classification/results/
  images_dir:  ieee5/classification/images/
 
  # Stratified k-fold cross-validation
  cv:
    n_splits:     5
    shuffle:      true
    random_state: 42
 
  # Scorer — weighted recall treats each class proportionally to its frequency.
  # Robust under class imbalance (relevant for IEEE 13-bus).
  # AHP is not used here: there is a single criterion, nothing to weight.
  scorer:
    metric: weighted_recall          # sklearn: recall_score(average='weighted')
 
  # Monte Carlo robustness analysis — perturbations over the training dataset.
  # Each simulation subsamples cls_train at subsample_rate and re-evaluates
  # weighted recall. Win rate = fraction of simulations where each model ranks
  # first. Stability index = std of weighted recall across simulations.
  monte_carlo:
    n_simulations: 1000
    subsample_rate: 0.80             # fraction of cls_train used per simulation
    random_state:   42
 
  # ── Candidate models ──────────────────────────────────────────────
 
  random_forest:
    model_id:     RF
    class_weight: balanced           # guards against imbalance in IEEE 13-bus
    random_state: 242
    n_jobs: -1
    param_grid:
      n_estimators:      [100, 200, 300]
      max_depth:         [5, 10, 15, 20]  
      min_samples_split: [5, 10]
      min_samples_leaf:  [1, 2]
      max_features:      [sqrt]
 
  xgboost:
    model_id:     XGB
    random_state: 242
    n_jobs: -1
    param_grid:
      n_estimators:     [100, 200, 300]
      max_depth:        [3, 6]
      learning_rate:    [0.01, 0.1]
      subsample:        [0.8, 1.0]
      colsample_bytree: [0.8, 1.0]
 
  knn:
    model_id: KNN
    n_jobs: -1
    param_grid:
      n_neighbors: [3, 5, 7, 11]
      weights:     [uniform, distance]
      metric:      [euclidean, manhattan]
